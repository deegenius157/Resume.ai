name: Job Ingestion Sync

on:
  schedule:
    - cron: '0 0 * * *' # Automatically run once a day at midnight UTC
  workflow_dispatch: # Enable manual triggering from the GitHub dashboard

jobs:
  sync-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Ingest Streams Sequentially
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: |
          node backend/fetch-jobs.js
          node backend/fetch-rss.js

